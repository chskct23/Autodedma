<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - Spam Shield</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004cff",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0f1523",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top App Bar Navigation -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer" data-icon="ArrowLeft">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Create Account</h2>
</div>
<!-- Header Section -->
<div class="flex flex-col items-center px-4 pb-3 pt-6">
<div class="bg-primary/10 p-4 rounded-full mb-4">
<span class="material-symbols-outlined text-primary text-4xl">shield_person</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-light text-[32px] font-bold leading-tight text-center">Join Spam Shield</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pb-3 pt-1 text-center max-w-sm">Protect your communication and reclaim your inbox from unwanted spam.</p>
</div>
<!-- Form Container -->
<div class="flex flex-col max-w-[480px] mx-auto w-full">
<!-- Full Name -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Full Name</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] pl-12 text-base font-normal leading-normal" placeholder="John Doe" type="text" value=""/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
</div>
</label>
</div>
<!-- Email/Phone -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Email or Phone Number</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] pl-12 text-base font-normal leading-normal" placeholder="example@mail.com or +1..." type="text" value=""/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">alternate_email</span>
</div>
</label>
</div>
<!-- Password -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Password</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] pl-12 text-base font-normal leading-normal" placeholder="Min. 8 characters" type="password" value=""/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer">visibility</span>
</div>
</label>
</div>
<!-- Confirm Password -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Confirm Password</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] pl-12 text-base font-normal leading-normal" placeholder="Repeat password" type="password" value=""/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock_reset</span>
</div>
</label>
</div>
<!-- CTA Button -->
<div class="px-4 py-6">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl transition-colors shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                    Create Account
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Footer Links -->
<div class="flex flex-col items-center gap-4 px-4 pb-8">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
<div class="flex items-center gap-2 py-4 w-full">
<div class="h-px bg-slate-300 dark:bg-slate-700 flex-1"></div>
<span class="text-slate-400 text-xs font-medium uppercase tracking-widest px-2">Secure Registration</span>
<div class="h-px bg-slate-300 dark:bg-slate-700 flex-1"></div>
</div>
<p class="text-slate-400 text-xs text-center px-8">
                    By joining, you agree to our Terms of Service and Privacy Policy.
                </p>
</div>
</div>
<div class="h-10"></div>
</div>
</body></html>
