<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Spam Shield</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#004cff",
                "background-light": "#f5f6f8",
                "background-dark": "#0f1523",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Spam Shield</h2>
</div>
<main class="flex-1 flex flex-col items-center justify-center px-4 py-12">
<div class="w-full max-w-[440px] space-y-8">
<div class="text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 text-primary mb-6">
<span class="material-symbols-outlined text-[32px]">shield_person</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight pb-3">Welcome Back</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal px-4">Log in to protect your communication and manage your shield settings.</p>
</div>
<form class="space-y-4" onsubmit="return false;">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal">
                            Email or Phone Number
                        </label>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-base font-normal transition-all" placeholder="name@example.com" type="text"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal">
                                Password
                            </label>
<a class="text-primary text-sm font-semibold hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative flex w-full items-stretch rounded-lg">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] pr-12 text-base font-normal transition-all" placeholder="Enter your password" type="password"/>
<div class="absolute right-0 top-0 h-full flex items-center pr-4 text-slate-400 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[22px]">visibility</span>
</div>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-lg transition-colors mt-4 flex items-center justify-center gap-2">
<span>Sign In</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-300 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-background-light dark:bg-background-dark text-slate-500">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-12 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="" class="w-5 h-5" data-alt="Google colorful logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDuGk72YQsP-cTLkEYOBYV4f1huSmiPFII74VYIKSIGuMFAp558G4iCgEhjX67sHVdqdLbMnrg1mQcI3Y38ftV3q4hqwB-MqWmZCrsCngKz5F-I2aDGR7qbR-TbCvPEzoHaWa9FnC-6Kl_6hUzaWNEyPIlrmTgR8YuP20_EsNRvuIR3LtMVHM6NoJn2fH84jhta9bPBhdgqh70uNgyjvvmZ5Z3NrK9eiDIkM7UGVZK0veLp43kFxNYlS4xsJ3VO-9RpGq7uVZDv4w"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-12 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-[20px] text-slate-900 dark:text-white">ios</span>
<span class="text-sm font-medium">Apple</span>
</button>
</div>
<p class="text-center text-slate-600 dark:text-slate-400 text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Sign up for free</a>
</p>
</div>
</main>
<footer class="p-8 text-center">
<p class="text-slate-400 text-xs">
                © 2024 Spam Shield Inc. All rights reserved. <br class="sm:hidden"/>
<a class="hover:text-primary mx-2" href="#">Privacy Policy</a> • 
                <a class="hover:text-primary mx-2" href="#">Terms of Service</a>
</p>
</footer>
</div>
</body></html>
